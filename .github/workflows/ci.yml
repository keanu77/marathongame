name: 持續整合

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: 型別、格式、單元測試與建置
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 取出原始碼
        uses: actions/checkout@v7

      - name: 安裝 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0
          run_install: false

      - name: 設定 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: 安裝相依套件
        run: pnpm install --frozen-lockfile

      - name: 執行完整品質檢查
        run: pnpm check

  functions-build:
    name: Cloudflare Functions 建置
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 取出原始碼
        uses: actions/checkout@v7

      - name: 安裝 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0
          run_install: false

      - name: 設定 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: 安裝相依套件
        run: pnpm install --frozen-lockfile

      - name: 建置 Cloudflare Functions
        run: pnpm build:functions

  e2e:
    name: Chromium 桌機與手機 E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 取出原始碼
        uses: actions/checkout@v7

      - name: 安裝 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0
          run_install: false

      - name: 設定 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: 安裝相依套件
        run: pnpm install --frozen-lockfile

      - name: 安裝 Chromium 與系統相依套件
        run: pnpm exec playwright install --with-deps chromium

      - name: 執行 Playwright E2E
        run: pnpm exec playwright test --workers=1

      - name: 保存 Playwright 報告
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
